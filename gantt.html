<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可编辑项目时间进度计划表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }
        .header-info {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }
        .header-info input {
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-left: 5px;
        }
        .time-setting {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #e8f4f8;
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .time-setting label {
            font-size: 14px;
            color: #333;
        }
        .time-setting input {
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .tips {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #a9c4e6;
            color: #333;
        }
        .task-name {
            text-align: left;
            min-width: 200px;
        }
        .gantt-row {
            display: flex;
            height: 30px;
        }
        .gantt-day {
            width: 30px;
            border-right: 1px solid #eee;
        }
        .gantt-done {
            background-color: #a5d6a7; /* 已完成-绿色 */
        }
        .gantt-todo {
            background-color: #ffcdd2; /* 待完成-粉色 */
        }
        .date-header {
            font-size: 12px;
            white-space: nowrap;
        }
        .editable-cell {
            cursor: pointer;
            min-height: 24px;
        }
        .editable-cell:hover {
            background-color: #f0f8ff;
        }
        .edit-input {
            width: 100%;
            padding: 4px;
            border: 1px solid #409eff;
            border-radius: 4px;
            outline: none;
        }
        .btn-group {
            margin: 15px 0;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-add {
            background-color: #67c23a;
            color: white;
        }
        .btn-clear {
            background-color: #f56c6c;
            color: white;
        }
        .btn-save {
            background-color: #409eff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>项目时间进度计划表</h1>
        <div class="header-info">
            <div>项目名称：<input type="text" id="projectName" placeholder="请在此添加项目名称"></div>
            <div>计划工时：<input type="number" id="totalDays" value="45" style="width: 60px;"> 天</div>
            <div>项目经理：<input type="text" id="manager" value="王小沐"></div>
        </div>

        <div class="time-setting">
            <label>设置查看时间：</label>
            <label>开始日期：<input type="date" id="startDate" value="2026-03-01"></label>
            <label>结束日期：<input type="date" id="endDate" value="2026-12-31"></label>
            <label>日期单位（天）：<input type="number" id="dateUnit" value="1" style="width: 40px;"></label>
        </div>

        <div class="tips">
            <p>提示：</p>
            <p>1、点击表格中的单元格可直接编辑内容，日期/数字会自动计算持续天数和完成率。</p>
            <p>2、绿色区域表示已完成，粉色区域表示尚未完成，仅在任务开始-结束日期范围内上色。</p>
            <p>3、日期轴会根据设置的开始/结束日期自动更新，包含星期显示。</p>
        </div>

        <div class="btn-group">
            <button class="btn btn-add" id="addTask">添加新事项</button>
            <button class="btn btn-clear" id="clearData">清空所有数据</button>
            <button class="btn btn-save" id="saveData">手动保存数据</button>
            <button class="btn btn-export" id="exportExcel" style="background-color:#e6a23c;color:white;">导出Excel</button>
            <!-- 新增：导出填写数据按钮 -->
            <button class="btn" id="exportData" style="background-color:#909399;color:white;">导出填写数据</button>
            <!-- 新增：导入填写数据按钮 -->
            <button class="btn" id="importData" style="background-color:#667eea;color:white;">导入填写数据</button>
            <!-- 隐藏的文件选择框（用于导入） -->
            <input type="file" id="fileInput" accept=".json" style="display: none;">
        </div>

        <table id="taskTable">
            <thead>
                <tr>
                    <th rowspan="2">序号</th>
                    <th rowspan="2" class="task-name">项目事项</th>
                    <th rowspan="2">负责人</th>
                    <th rowspan="2">开始日期</th>
                    <th rowspan="2">结束日期</th>
                    <th rowspan="2">持续天数</th>
                    <th rowspan="2">已完成天数</th>
                    <th rowspan="2">完成率</th>
                    <th colspan="1" class="date-header">
                        <div id="dateHeader" class="gantt-row"></div>
                    </th>
                </tr>
            </thead>
            <tbody id="taskBody">
                <!-- 可编辑的任务行将由JS动态生成 -->
            </tbody>
        </table>
    </div>

    <script>
        // 存储键名
        const STORAGE_KEY = 'project_gantt_data';

        // 全局日期格式化函数（清除时分秒，避免对比错误）
        function formatDate(date) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            return d;
        }

        // 计算开始到结束日期的总天数（含首尾）
        function getTotalDaysInRange(startDate, endDate) {
            const s = formatDate(startDate);
            const e = formatDate(endDate);
            return Math.ceil((e - s) / (1000 * 60 * 60 * 24)) + 1;
        }
        
        // 初始化数据（优先从本地存储读取）
        let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || Array.from({length: 10}, (_, i) => ({
            id: i + 1,
            name: "点击编辑工作事项",
            manager: "点击编辑负责人",
            startDate: `2025-01-${String(i + 1).padStart(2, '0')}`,
            endDate: `2025-02-${String(i + 6).padStart(2, '0')}`,
            doneDays: Math.floor(Math.random() * 10) + 1
        })).map(task => {
            // 格式化初始日期，确保无时分秒
            task.startDate = formatDate(task.startDate).toISOString().split('T')[0];
            task.endDate = formatDate(task.endDate).toISOString().split('T')[0];
            return task;
        });

        // 页面头部信息初始化
        function initHeaderInfo() {
            const savedProjectName = localStorage.getItem('project_name') || '';
            const savedManager = localStorage.getItem('project_manager') || '王小沐';
            const savedTotalDays = localStorage.getItem('project_days') || 45;
            
            document.getElementById('projectName').value = savedProjectName;
            document.getElementById('manager').value = savedManager;
            document.getElementById('totalDays').value = savedTotalDays;
            
            // 监听头部信息变化并保存
            document.getElementById('projectName').addEventListener('change', (e) => {
                localStorage.setItem('project_name', e.target.value);
            });
            document.getElementById('manager').addEventListener('change', (e) => {
                localStorage.setItem('project_manager', e.target.value);
            });
            document.getElementById('totalDays').addEventListener('change', (e) => {
                localStorage.setItem('project_days', e.target.value);
            });
        }

        // 生成日期表头
        function renderDateHeader() {
            const start = formatDate(document.getElementById('startDate').value);
            const end = formatDate(document.getElementById('endDate').value);
            const header = document.getElementById('dateHeader');
            header.innerHTML = '';
            
            let current = new Date(start);
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            const totalDays = getTotalDaysInRange(start, end);
            
            // 更新表头的 colspan 为动态值
            document.querySelector('.date-header').colSpan = totalDays;
            
            while (current <= end) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'gantt-day';
                dayDiv.innerHTML = `
                    <div>${current.getDate()}</div>
                    <div style="font-size:10px">${weekDays[current.getDay()]}</div>
                `;
                header.appendChild(dayDiv);
                current.setDate(current.getDate() + 1);
            }
        }

        // 计算两个日期之间的天数差
        function getDaysBetween(start, end) {
            if (!start || !end) return 0;
            const s = formatDate(start);
            const e = formatDate(end);
            return Math.ceil((e - s) / (1000 * 60 * 60 * 24)) + 1;
        }

        // 渲染甘特图条（核心修复：仅在[taskStart, taskEnd]范围内上色）
        function renderGanttBar(task, projectStart) {
            const taskStart = formatDate(task.startDate);
            const taskEnd = formatDate(task.endDate);
            const doneEnd = formatDate(task.startDate);
            
            // 修正已完成天数边界：大于0时才偏移
            if (task.doneDays > 0) {
                doneEnd.setDate(doneEnd.getDate() + task.doneDays - 1);
            }
            
            let html = '';
            let current = new Date(projectStart);
            const endDate = formatDate(document.getElementById('endDate').value);
            
            while (current <= endDate) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'gantt-day';
                
                const currentDate = formatDate(current);
                // 核心逻辑：先判断是否在任务时间范围内，不在则不涂色
                if (currentDate >= taskStart && currentDate <= taskEnd) {
                    // 在范围内：已完成区间（绿色）、待完成区间（粉色）
                    if (currentDate <= doneEnd) {
                        dayDiv.classList.add('gantt-done');
                    } else {
                        dayDiv.classList.add('gantt-todo');
                    }
                }
                // 超出任务结束日期：无样式，保持空白
                
                html += dayDiv.outerHTML;
                current.setDate(current.getDate() + 1);
                current = formatDate(current); // 重新格式化，避免时分秒干扰
            }
            return html;
        }

        // 创建可编辑单元格
        function createEditableCell(value, field, taskId) {
            const cell = document.createElement('td');
            cell.className = `editable-cell ${field === 'name' ? 'task-name' : ''}`;
            cell.textContent = value;
            cell.dataset.field = field;
            cell.dataset.taskId = taskId;
            
            cell.addEventListener('click', function() {
                const currentValue = this.textContent;
                const field = this.dataset.field;
                const taskId = this.dataset.taskId;
                
                // 根据字段类型创建不同的输入框
                let input;
                if (field === 'startDate' || field === 'endDate') {
                    input = document.createElement('input');
                    input.type = 'date';
                    input.value = currentValue;
                } else if (field === 'doneDays') {
                    input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.value = currentValue;
                    input.style.width = '60px';
                } else {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.value = currentValue;
                }
                
                input.className = 'edit-input';
                
                // 清空单元格并添加输入框
                this.innerHTML = '';
                this.appendChild(input);
                input.focus();
                
                // 失去焦点时保存值
                input.addEventListener('blur', function() {
                    const newValue = this.value.trim();
                    if (newValue) {
                        // 更新单元格显示
                        cell.textContent = newValue;
                        // 更新任务数据
                        updateTaskData(taskId, field, newValue);
                        // 重新渲染表格
                        renderTasks();
                    } else {
                        cell.textContent = currentValue;
                    }
                });
                
                // 按回车保存
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        input.blur();
                    }
                });
            });
            return cell;
        }

        // 更新任务数据（添加已完成天数校验）
        function updateTaskData(taskId, field, value) {
            const taskIndex = tasks.findIndex(t => t.id == taskId);
            if (taskIndex !== -1) {
                // 校验已完成天数：不超过持续天数，不小于0
                if (field === 'doneDays') {
                    const duration = getDaysBetween(tasks[taskIndex].startDate, tasks[taskIndex].endDate);
                    value = Math.min(Number(value), duration);
                    value = Math.max(0, value);
                }
                tasks[taskIndex][field] = value;
                
                // 如果修改了日期，重新格式化
                if (field === 'startDate' || field === 'endDate') {
                    tasks[taskIndex][field] = formatDate(value).toISOString().split('T')[0];
                }
                
                // 保存到本地存储
                saveTasksToLocalStorage();
            }
        }

        // 保存任务数据到本地存储
        function saveTasksToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        // 渲染任务行
        function renderTasks() {
            const tbody = document.getElementById('taskBody');
            tbody.innerHTML = '';
            const start = formatDate(document.getElementById('startDate').value);
            const end = formatDate(document.getElementById('endDate').value);
            const totalDays = getTotalDaysInRange(start, end); // 动态列数
            
            tasks.forEach(task => {
                const tr = document.createElement('tr');
                
                // 序号列（不可编辑）
                const indexCell = document.createElement('td');
                indexCell.textContent = task.id;
                tr.appendChild(indexCell);
                
                // 可编辑列
                tr.appendChild(createEditableCell(task.name, 'name', task.id));
                tr.appendChild(createEditableCell(task.manager, 'manager', task.id));
                tr.appendChild(createEditableCell(task.startDate, 'startDate', task.id));
                tr.appendChild(createEditableCell(task.endDate, 'endDate', task.id));
                
                // 计算列（不可编辑）
                const duration = getDaysBetween(task.startDate, task.endDate);
                const durationCell = document.createElement('td');
                durationCell.textContent = duration;
                tr.appendChild(durationCell);
                
                // 已完成天数列（可编辑）
                tr.appendChild(createEditableCell(task.doneDays, 'doneDays', task.id));
                
                // 完成率列（不可编辑）
                const progress = duration > 0 ? (task.doneDays / duration * 100).toFixed(0) : 0;
                const progressCell = document.createElement('td');
                progressCell.textContent = `${progress}%`;
                tr.appendChild(progressCell);
                
                // 甘特图列：使用动态列数
                const ganttCell = document.createElement('td');
                ganttCell.colSpan = totalDays;
                ganttCell.innerHTML = `<div class="gantt-row">${renderGanttBar(task, start)}</div>`;
                tr.appendChild(ganttCell);
                
                tbody.appendChild(tr);
            });
        }

        // 添加新任务
        function addNewTask() {
            const newId = Math.max(...tasks.map(t => t.id), 0) + 1;
            const today = formatDate(new Date()).toISOString().split('T')[0];
            const nextWeek = formatDate(new Date());
            nextWeek.setDate(nextWeek.getDate() + 7);
            const nextWeekStr = nextWeek.toISOString().split('T')[0];
            
            const newTask = {
                id: newId,
                name: "点击编辑工作事项",
                manager: "点击编辑负责人",
                startDate: today,
                endDate: nextWeekStr,
                doneDays: 0
            };
            tasks.push(newTask);
            saveTasksToLocalStorage();
            renderTasks();
        }

        // 清空所有数据
        function clearAllData() {
            if (confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                tasks = [];
                localStorage.removeItem(STORAGE_KEY);
                // 同时清空头部信息
                localStorage.removeItem('project_name');
                localStorage.removeItem('project_manager');
                localStorage.removeItem('project_days');
                // 重置输入框
                document.getElementById('projectName').value = '';
                document.getElementById('manager').value = '王小沐';
                document.getElementById('totalDays').value = 45;
                renderTasks();
            }
        }

        // 手动保存数据
        function manualSaveData() {
            saveTasksToLocalStorage();
            alert('数据已成功保存！');
        }

        // 补全导出Excel功能
        function exportToExcel() {
            let csv = "序号,项目事项,负责人,开始日期,结束日期,持续天数,已完成天数,完成率\n";
            tasks.forEach(task => {
                const duration = getDaysBetween(task.startDate, task.endDate);
                const progress = duration > 0 ? (task.doneDays / duration * 100).toFixed(0) : 0;
                csv += `${task.id},${task.name},${task.manager},${task.startDate},${task.endDate},${duration},${task.doneDays},${progress}%\n`;
            });
            // 创建下载链接
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `项目进度表_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`;
            link.click();
            URL.revokeObjectURL(url);
        }

        // 新增：导出所有填写数据（项目名称+经理+任务等）为JSON文件
        function exportAllData() {
            // 收集所有数据：头部信息 + 任务数据
            const allData = {
                projectName: localStorage.getItem('project_name') || '',
                projectManager: localStorage.getItem('project_manager') || '王小沐',
                projectDays: localStorage.getItem('project_days') || 45,
                tasks: JSON.parse(localStorage.getItem(STORAGE_KEY)) || []
            };
            // 转为JSON并下载
            const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `项目进度表_填写数据_${new Date().toLocaleDateString().replace(/\//g, '-')}.json`;
            link.click();
            URL.revokeObjectURL(url);
            alert('填写数据已导出！');
        }

        // 新增：导入JSON数据文件
        function importAllData(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const allData = JSON.parse(e.target.result);
                    // 校验数据格式
                    if (!allData || typeof allData !== 'object') {
                        alert('导入失败：文件格式错误！');
                        return;
                    }
                    // 恢复头部信息
                    localStorage.setItem('project_name', allData.projectName || '');
                    localStorage.setItem('project_manager', allData.projectManager || '王小沐');
                    localStorage.setItem('project_days', allData.projectDays || 45);
                    // 恢复任务数据
                    tasks = allData.tasks || [];
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
                    // 重新初始化页面
                    initHeaderInfo();
                    renderDateHeader();
                    renderTasks();
                    alert('数据导入成功！');
                } catch (err) {
                    alert('数据导入失败，请确认文件是导出的JSON格式！');
                    console.error('导入错误：', err);
                }
            };
            reader.readAsText(file);
        }

        // 页面初始化
        window.onload = function() {
            // 初始化头部信息
            initHeaderInfo();
            // 初始化日期表头
            renderDateHeader();
            // 初始化任务列表
            renderTasks();
            
            // 绑定原有按钮事件
            document.getElementById('addTask').addEventListener('click', addNewTask);
            document.getElementById('clearData').addEventListener('click', clearAllData);
            document.getElementById('saveData').addEventListener('click', manualSaveData);
            document.getElementById('exportExcel').addEventListener('click', exportToExcel);
            
            // 绑定日期选择框变化事件（更新表头）
            document.getElementById('startDate').addEventListener('change', renderDateHeader);
            document.getElementById('endDate').addEventListener('change', renderDateHeader);
            document.getElementById('dateUnit').addEventListener('change', renderDateHeader);
            
            // 绑定新增的导入/导出按钮事件
            document.getElementById('exportData').addEventListener('click', exportAllData);
            document.getElementById('importData').addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });
            document.getElementById('fileInput').addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    importAllData(e.target.files[0]);
                    // 清空文件选择框，避免重复导入同一文件无反应
                    e.target.value = '';
                }
            });
        };
    </script>
</body>
</html>
